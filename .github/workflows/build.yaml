name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      SOLUTION: UnSafengine64.sln
      CONFIGURATION: Release
      PLATFORM: x64
      PIN_URL: https://software.intel.com/sites/landingpage/pintool/downloads/pin-3.18-98332-gaebd7b1e6-msvc-windows.zip
      PIN_ARCHIVE: C:\Windows\Temp\pin-3.18-98332-gaebd7b1e6-msvc-windows.zip
      PIN_EXTRACT: C:\Windows\Temp\pin-src
      PIN_ROOT: C:\pin
      PINTOOL_DIR: C:\pintool

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install VS2019 toolset and Windows SDK 18362
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $installer = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vs_installer.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found" }
          if (-not (Test-Path $installer)) { throw "vs_installer.exe not found" }
          $installPath = (& $vswhere -latest -products * -property installationPath | Select-Object -First 1).Trim()
          if (-not $installPath) { throw "Visual Studio installation not found" }
          $arguments = @(
            'modify'
            '--installPath', $installPath
            '--add', 'Microsoft.VisualStudio.Component.VC.v142.x86.x64'
            '--add', 'Microsoft.VisualStudio.Component.Windows10SDK.18362'
            '--quiet'
            '--norestart'
            '--wait'
          )
          $process = Start-Process -FilePath $installer -ArgumentList $arguments -Wait -PassThru -NoNewWindow
          if ($null -eq $process.ExitCode) { throw 'vs_installer modify did not report an exit code' }
          if ($process.ExitCode -ne 0) { throw "vs_installer modify failed with exit code $($process.ExitCode)" }

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Prepare build directories
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "$env:PINTOOL_DIR" | Out-Null
          Remove-Item -Recurse -Force "$env:PIN_EXTRACT" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "$env:PIN_EXTRACT" | Out-Null

      - name: Download Intel Pin 3.18
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          curl.exe -L --fail --retry 3 --output "$env:PIN_ARCHIVE" "$env:PIN_URL"

      - name: Extract Intel Pin to C:\pin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Remove-Item -Recurse -Force "$env:PIN_ROOT" -ErrorAction SilentlyContinue
          Expand-Archive -Path "$env:PIN_ARCHIVE" -DestinationPath "$env:PIN_EXTRACT" -Force
          $pinFolder = Get-ChildItem -Path "$env:PIN_EXTRACT" -Directory | Where-Object { $_.Name -like 'pin-*' } | Select-Object -First 1
          if (-not $pinFolder) { throw "Pin archive did not contain an extracted directory" }
          Move-Item -Path $pinFolder.FullName -Destination "$env:PIN_ROOT"

      - name: Build solution
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          msbuild "$env:SOLUTION" /m /p:Configuration=$env:CONFIGURATION /p:Platform=$env:PLATFORM

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UnSafengine64-${{ env.CONFIGURATION }}-${{ env.PLATFORM }}
          path: |
            C:\pintool\UnSafengine64.dll
            C:\pintool\UnSafengine64.exe
            C:\pintool\UnSafengine64.cfg
          if-no-files-found: error
